<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Daily Orbit — Mobile</title>
  <meta name="description" content="A mobile-first neumorphic and glassmorphic circular calendar dashboard optimized for Android devices." />
  <meta name="theme-color" content="#eef3fb" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <main class="app" id="app">
    <header class="topbar">
      <div class="brand-block">
        <span class="brand-mark" aria-hidden="true">◌</span>
        <div>
          <p class="eyebrow">Daily Orbit</p>
          <h1 id="greetingText">Hello</h1>
        </div>
      </div>

      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch theme">
        <span class="theme-icon" aria-hidden="true">☾</span>
      </button>
    </header>

    <section class="today-card glass-card" aria-label="Today overview">
      <div>
        <p class="card-label">Today</p>
        <h2 id="liveDate">—</h2>
      </div>
      <div class="day-progress" aria-label="Day progress">
        <span id="dayProgress">0%</span>
        <small id="dayProgressHint">left today</small>
      </div>
    </section>

    <section class="orbit-card glass-card" aria-label="Circular calendar and clock">
      <div class="section-title">
        <div>
          <p class="card-label">Calendar wheel</p>
          <h2>Live day dial</h2>
        </div>
        <span class="live-pill"><i></i>Live</span>
      </div>

      <div class="wheel-stage" id="wheelStage">
        <svg id="wheelSvg" class="wheel-svg" viewBox="0 0 360 360" role="img" aria-labelledby="wheelTitle wheelDesc">
          <title id="wheelTitle">Circular calendar</title>
          <desc id="wheelDesc">Shows the current day, month, and weekday as circular progress rings.</desc>
        </svg>

        <button class="center-clock" id="centerClock" type="button" aria-label="Tap for a small particle effect">
          <span class="dial-face" aria-hidden="true">
            <span class="hand hour-hand" id="hourHand"></span>
            <span class="hand minute-hand" id="minuteHand"></span>
            <span class="hand second-hand" id="secondHand"></span>
            <span class="dial-dot"></span>
          </span>
          <span class="digital-time" id="digitalTime">00:00</span>
          <span class="tap-hint">tap</span>
        </button>

        <div class="particles" id="particles" aria-hidden="true"></div>
      </div>

      <div class="legend-row" aria-label="Ring legend">
        <span><i class="dot day-dot"></i>Day</span>
        <span><i class="dot month-dot"></i>Month</span>
        <span><i class="dot week-dot"></i>Week</span>
      </div>
    </section>

    <section class="quick-grid" aria-label="Daily widgets">
      <article class="mini-card glass-card">
        <div class="icon-bubble" id="weatherIcon" aria-hidden="true">☀️</div>
        <div>
          <p class="card-label">Mood</p>
          <h3 id="weatherTemp">24°C</h3>
          <p id="weatherDesc">Clear</p>
        </div>
      </article>

      <article class="mini-card glass-card">
        <div class="icon-bubble" aria-hidden="true">⌁</div>
        <div class="grow">
          <p class="card-label">Momentum</p>
          <h3><span id="stepsCount">0</span></h3>
          <div class="progress-track" aria-hidden="true"><span id="stepsFill"></span></div>
        </div>
      </article>
    </section>

    <section class="focus-card glass-card" aria-label="Focus mode selector">
      <div class="section-title compact">
        <div>
          <p class="card-label">Focus mode</p>
          <h2 id="focusModeLabel">Calm</h2>
        </div>
      </div>

      <div class="mode-row" role="group" aria-label="Choose dashboard focus mode">
        <button class="mode-button active" type="button" data-mode="Calm" data-note="Soft rhythm. Keep the dashboard quiet and easy to scan.">Calm</button>
        <button class="mode-button" type="button" data-mode="Work" data-note="Reduce visual noise. Start with one high-impact task.">Work</button>
        <button class="mode-button" type="button" data-mode="Move" data-note="Reset posture, breathe, and move for two minutes.">Move</button>
      </div>

      <p class="focus-note" id="focusNote">Soft rhythm. Keep the dashboard quiet and easy to scan.</p>
    </section>

    <section class="quote-card glass-card">
      <button class="quote-button" id="quoteButton" type="button" aria-label="Show another quote">
        <span class="card-label">Daily spark</span>
        <span class="quote-text" id="quoteText">Loading…</span>
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
